name: Deploy to AWS

on:
  push:
    branches:
      - main

concurrency:
  group: infra-core-deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

jobs:
  deploy-to-aws:
    name: Terraform Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Terraform Init (bootstrap)
        run: terraform init
        working-directory: infra/bootstrap

      - name: Terraform Validate (bootstrap)
        run: terraform validate
        working-directory: infra/bootstrap

      - name: Import existing S3 bucket into bootstrap state (idempotent)
        run: |
          terraform import aws_s3_bucket.terraform_state nextime-frame-state-bucket-s3 || true
          terraform import aws_s3_bucket_versioning.versioning nextime-frame-state-bucket-s3 || true
          terraform import aws_s3_bucket_server_side_encryption_configuration.encryption nextime-frame-state-bucket-s3 || true
        working-directory: infra/bootstrap

      - name: Terraform Plan (bootstrap)
        run: terraform plan -out=tfplan-bootstrap
        working-directory: infra/bootstrap

      - name: Terraform Apply (bootstrap)
        run: terraform apply -auto-approve tfplan-bootstrap
        working-directory: infra/bootstrap

      - name: Terraform Init (infra)
        run: terraform init
        working-directory: infra

      - name: Terraform Validate (infra)
        run: terraform validate
        working-directory: infra

      - name: Terraform Plan (infra)
        run: |
          terraform plan \
            -input=false \
            -var="mongo_uri=${{ secrets.MONGO_URI }}" \
            -var="datadog_api_key=${{ secrets.DATADOG_API_KEY }}" \
            -out=tfplan
        working-directory: infra

      - name: Terraform Apply (infra)
        run: terraform apply -auto-approve tfplan
        working-directory: infra
